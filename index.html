<script>
// ═══════════════════════════════════════════
// MIDI 文本编辑器 — 核心引擎
// ═══════════════════════════════════════════

(function() {
  'use strict';

  // ── DOM 引用 ──
  const editor = document.getElementById('editor');
  const gutter = document.getElementById('gutter');
  const highlightOverlay = document.getElementById('highlightOverlay');
  const btnPlay = document.getElementById('btnPlay');
  const btnStop = document.getElementById('btnStop');
  const statusIndicator = document.getElementById('statusIndicator');
  const statusText = document.getElementById('statusText');
  const noteCount = document.getElementById('noteCount');
  const totalDuration = document.getElementById('totalDuration');
  const errorCount = document.getElementById('errorCount');
  const toast = document.getElementById('toast');
  const fileInput = document.getElementById('fileInput');

  // ── 状态 ──
  let audioCtx = null;
  let isPlaying = false;
  let isPaused = false;
  let currentNoteIndex = 0;
  let scheduledNotes = [];
  let pauseTime = 0;
  let startTime = 0;
  let bpm = 120;
  let masterVolume = 0.8;
  let waveform = 'triangle';
  let parsedNotes = [];
  let parseErrors = [];
  let toastTimer = null;
  let editorScrollTop = 0;

  // ═══════════════════════════════════════════
  // 音频引擎
  // ═══════════════════════════════════════════

  function getAudioContext() {
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function parseNoteName(name) {
    const match = name.trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
    if (!match) return null;
    const noteMap = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    const base = noteMap[match[1].toUpperCase()];
    const accidental = match[2] === '#' ? 1 : match[2] === 'b' ? -1 : 0;
    const octave = parseInt(match[3], 10);
    return (octave + 1) * 12 + base + accidental;
  }

  // 解析 "分数=音名" 格式，如 "1/1=C3", "4/3=F3"
  function parsePitch(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return null;
    // 格式: 分子/分母=音名
    const eqIdx = trimmed.indexOf('=');
    if (eqIdx === -1) {
      // 没有=号，尝试直接解析音名
      const midi = parseNoteName(trimmed);
      if (midi !== null && midi >= 0 && midi <= 127) {
        return { midi, name: trimmed.toUpperCase(), frac: '1/1', fracNum: 1, fracDen: 1 };
      }
      return null;
    }
    const fracPart = trimmed.substring(0, eqIdx).trim();
    const namePart = trimmed.substring(eqIdx + 1).trim();
    // 解析分数
    const fracMatch = fracPart.match(/^(\d+)\s*\/\s*(\d+)$/);
    let fracNum = 1, fracDen = 1, fracStr = '1/1';
    if (fracMatch) {
      fracNum = parseInt(fracMatch[1], 10);
      fracDen = parseInt(fracMatch[2], 10);
      if (fracDen === 0) fracDen = 1;
      fracStr = fracNum + '/' + fracDen;
    }
    // 解析音名
    const midi = parseNoteName(namePart);
    if (midi !== null && midi >= 0 && midi <= 127) {
      return { midi, name: namePart.toUpperCase(), frac: fracStr, fracNum, fracDen };
    }
    return null;
  }

  function midiToNoteName(midi) {
    const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octave = Math.floor(midi / 12) - 1;
    const name = names[midi % 12];
    return name + octave;
  }

  function scheduleNote(note, time) {
    const ctx = getAudioContext();
    const freq = midiToFreq(note.pitch);

    // 主振荡器
    const osc = ctx.createOscillator();
    osc.type = waveform;
    osc.frequency.setValueAtTime(freq, time);

    // 泛音振荡器（增加音色丰富度）
    const osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2, time);

    // 增益节点 — ADSR 包络
    const gain = ctx.createGain();
    const velocity = note.velocity / 100;
    const vol = velocity * masterVolume;
    const beatDuration = 60 / bpm;
    const noteDuration = note.duration * beatDuration;

    const attackTime = Math.min(0.02, noteDuration * 0.1);
    const decayTime = Math.min(0.08, noteDuration * 0.2);
    const sustainLevel = vol * 0.7;
    const releaseTime = Math.min(0.15, noteDuration * 0.3);

    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vol, time + attackTime);
    gain.gain.linearRampToValueAtTime(sustainLevel, time + attackTime + decayTime);
    gain.gain.setValueAtTime(sustainLevel, time + noteDuration * 0.8);
    gain.gain.linearRampToValueAtTime(0, time + noteDuration);

    // 泛音增益
    const gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0, time);
    gain2.gain.linearRampToValueAtTime(vol * 0.15, time + attackTime);
    gain2.gain.linearRampToValueAtTime(0, time + noteDuration * 0.5);

    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(ctx.destination);
    gain2.connect(ctx.destination);

    osc.start(time);
    osc.stop(time + noteDuration + 0.05);
    osc2.start(time);
    osc2.stop(time + noteDuration * 0.5 + 0.05);

    return { osc, osc2, gain, gain2 };
  }

  // ═══════════════════════════════════════════
  // 解析引擎
  // ═══════════════════════════════════════════

  function parseEditor() {
    const text = editor.value;
    const lines = text.split('\n');
    parsedNotes = [];
    parseErrors = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line === '' || line.startsWith('//') || line.startsWith('#')) continue;

      const parts = line.split(',').map(s => s.trim());
      if (parts.length < 2) {
        parseErrors.push({ line: i, msg: '格式错误：至少需要时值和音高' });
        continue;
      }

      // ── 时值: 分子/分母 格式 ──
      let durNum = 1, durDen = 1, durFrac = '1/1';
      if (parts[0] !== '') {
        const durMatch = parts[0].match(/^(\d+)\s*\/\s*(\d+)$/);
        if (durMatch) {
          durNum = parseInt(durMatch[1], 10);
          durDen = parseInt(durMatch[2], 10);
          if (durDen === 0) { parseErrors.push({ line: i, msg: '时值分母不能为0' }); continue; }
          durFrac = durNum + '/' + durDen;
        } else {
          parseErrors.push({ line: i, msg: '时值格式错误：需为 分子/分母（如 1/1, 1/8）' });
          continue;
        }
      }
      const duration = durNum / durDen; // 拍数

      // ── 音高: 分子/分母=音名 格式 ──
      const pitchResult = parsePitch(parts[1]);
      if (!pitchResult) {
        parseErrors.push({ line: i, msg: '音高格式错误：需为 分数=音名（如 1/1=C4, 4/3=F3）' });
        continue;
      }

      // ── 大小: 01~10，默认 10 ──
      let size = 10;
      let sizeStr = '10';
      if (parts.length >= 3 && parts[2] !== '') {
        const sizeRaw = parts[2];
        const sizeNum = parseInt(sizeRaw, 10);
        if (!isNaN(sizeNum) && sizeNum >= 1 && sizeNum <= 10 && /^\d{2}$/.test(sizeRaw)) {
          size = sizeNum;
          sizeStr = sizeRaw;
        } else {
          parseErrors.push({ line: i, msg: '大小格式错误：需为两位数 01~10' });
          continue;
        }
      }
      const velocity = size * 10; // 映射到 10~100

      // ── 编号: 00~99，默认为空字符串 ──
      let noteId = '';
      if (parts.length >= 4 && parts[3] !== '') {
        const idRaw = parts[3];
        if (/^\d{2}$/.test(idRaw)) {
          noteId = idRaw;
        } else {
          parseErrors.push({ line: i, msg: '编号格式错误：需为两位数 00~99' });
          continue;
        }
      }

      parsedNotes.push({
        line: i,
        duration,
        durFrac,
        durNum,
        durDen,
        pitch: pitchResult.midi,
        pitchName: pitchResult.name,
        pitchFrac: pitchResult.frac,
        pitchFracNum: pitchResult.fracNum,
        pitchFracDen: pitchResult.fracDen,
        size,
        sizeStr,
        velocity,
        id: noteId,
        raw: line
      });
    }

    updateGutter();
    updateStatusBar();
    updateHighlightOverlay();
    return parsedNotes;
  }

  // ═══════════════════════════════════════════
  // 行号与高亮
  // ═══════════════════════════════════════════

  function updateGutter() {
    const lines = editor.value.split('\n');
    const errorLines = new Set(parseErrors.map(e => e.line));
    let html = '';
    for (let i = 0; i < lines.length; i++) {
      const cls = errorLines.has(i) ? ' error' : '';
      html += `<div class="gutter-line${cls}">${i + 1}</div>`;
    }
    gutter.innerHTML = html;

    // 同步滚动
    gutter.scrollTop = editor.scrollTop;
  }

  function updateHighlightOverlay() {
    const lineHeight = parseFloat(getComputedStyle(editor).lineHeight);
    const lines = editor.value.split('\n');
    let html = '';
    for (let i = 0; i < lines.length; i++) {
      html += `<div class="highlight-row" style="top:${i * lineHeight}px;height:${lineHeight}px"></div>`;
    }
    highlightOverlay.innerHTML = html;
  }

  function highlightLine(index) {
    const rows = highlightOverlay.querySelectorAll('.highlight-row');
    rows.forEach(r => r.classList.remove('playing'));
    const gutterLines = gutter.querySelectorAll('.gutter-line');
    gutterLines.forEach(l => l.classList.remove('playing'));

    if (index >= 0 && index < parsedNotes.length) {
      const note = parsedNotes[index];
      if (note.line < rows.length) {
        rows[note.line].classList.add('playing');
      }
      if (note.line < gutterLines.length) {
        gutterLines[note.line].classList.add('playing');
      }
      updateNoteInfo(note, index);
    }
  }

  function clearHighlight() {
    const rows = highlightOverlay.querySelectorAll('.highlight-row');
    rows.forEach(r => r.classList.remove('playing'));
    const gutterLines = gutter.querySelectorAll('.gutter-line');
    gutterLines.forEach(l => l.classList.remove('playing'));
    clearNoteInfo();
  }

  function updateNoteInfo(note, index) {
    document.getElementById('infoLine').textContent = `${index + 1} / ${parsedNotes.length}`;
    document.getElementById('infoDurFrac').textContent = note.durFrac;
    document.getElementById('infoDuration').textContent = note.duration.toFixed(3) + ' 拍';
    document.getElementById('infoPitchFrac').textContent = note.pitchFrac;
    document.getElementById('infoPitch').textContent = note.pitch;
    document.getElementById('infoPitchName').textContent = note.pitchName;
    document.getElementById('infoSize').textContent = note.sizeStr + ' (力度:' + note.velocity + ')';
    document.getElementById('infoId').textContent = note.id || '-';
  }

  function clearNoteInfo() {
    document.getElementById('infoLine').textContent = '-';
    document.getElementById('infoDurFrac').textContent = '-';
    document.getElementById('infoDuration').textContent = '-';
    document.getElementById('infoPitchFrac').textContent = '-';
    document.getElementById('infoPitch').textContent = '-';
    document.getElementById('infoPitchName').textContent = '-';
    document.getElementById('infoSize').textContent = '-';
    document.getElementById('infoId').textContent = '-';
  }

  // ═══════════════════════════════════════════
  // 状态栏
  // ═══════════════════════════════════════════

  function updateStatusBar() {
    noteCount.textContent = `音符: ${parsedNotes.length}`;
    const totalBeats = parsedNotes.reduce((sum, n) => sum + n.duration, 0);
    totalDuration.textContent = `总时长: ${totalBeats.toFixed(1)}拍`;

    if (parseErrors.length > 0) {
      errorCount.style.display = 'inline';
      errorCount.textContent = `错误: ${parseErrors.length}`;
    } else {
      errorCount.style.display = 'none';
    }
  }

  function setStatus(state) {
    statusIndicator.className = 'status-indicator ' + state;
    switch (state) {
      case 'ready': statusText.textContent = '就绪'; break;
      case 'playing': statusText.textContent = '演奏中...'; break;
      case 'paused': statusText.textContent = '已暂停'; break;
    }
  }

  // ═══════════════════════════════════════════
  // 播放控制
  // ═══════════════════════════════════════════

  function play() {
    parseEditor();
    if (parsedNotes.length === 0) {
      showToast('没有可播放的音符');
      return;
    }

    const ctx = getAudioContext();
    isPlaying = true;
    isPaused = false;
    btnPlay.innerHTML = '⏸ 暂停';
    btnPlay.classList.add('accent2');
    btnPlay.classList.remove('primary');
    btnStop.disabled = false;
    setStatus('playing');

    const now = ctx.currentTime;
    startTime = now;
    let cumulativeTime = 0;
    scheduledNotes = [];

    for (let i = 0; i < parsedNotes.length; i++) {
      const note = parsedNotes[i];
      const noteStartTime = now + cumulativeTime;

      const scheduled = scheduleNote(note, noteStartTime);
      scheduled.noteIndex = i;
      scheduled.startTime = noteStartTime;
      scheduled.duration = note.duration * (60 / bpm);
      scheduledNotes.push(scheduled);

      cumulativeTime += note.duration * (60 / bpm);
    }

    // 使用定时器更新 UI 高亮
    currentNoteIndex = 0;
    scheduleUIUpdates();
  }

  function scheduleUIUpdates() {
    if (!isPlaying || scheduledNotes.length === 0) return;

    const ctx = getAudioContext();
    const now = ctx.currentTime;

    // 找到当前应该播放的音符
    for (let i = currentNoteIndex; i < scheduledNotes.length; i++) {
      const s = scheduledNotes[i];
      if (now < s.startTime + s.duration) {
        if (i !== currentNoteIndex) {
          currentNoteIndex = i;
          highlightLine(i);
        }
        break;
      }
      if (i === scheduledNotes.length - 1) {
        // 所有音符都已播放完毕
        if (now >= s.startTime + s.duration) {
          stopPlayback();
          return;
        }
      }
    }

    // 下一帧继续
    if (isPlaying) {
      requestAnimationFrame(scheduleUIUpdates);
    }
  }

  function pause() {
    if (!isPlaying) return;
    isPlaying = false;
    isPaused = true;

    // 停止所有振荡器
    scheduledNotes.forEach(s => {
      try { s.osc.stop(); } catch(e) {}
      try { s.osc2.stop(); } catch(e) {}
    });
    scheduledNotes = [];

    pauseTime = audioCtx.currentTime - startTime;
    btnPlay.innerHTML = '▶ 继续';
    btnPlay.classList.add('primary');
    btnPlay.classList.remove('accent2');
    btnStop.disabled = false;
    setStatus('paused');
  }

  function resume() {
    if (!isPaused) return;
    parseEditor();
    if (parsedNotes.length === 0) return;

    const ctx = getAudioContext();
    isPlaying = true;
    isPaused = false;
    btnPlay.innerHTML = '⏸ 暂停';
    btnPlay.classList.add('accent2');
    btnPlay.classList.remove('primary');
    btnStop.disabled = false;
    setStatus('playing');

    const now = ctx.currentTime;
    startTime = now - pauseTime;

    // 从当前音符继续
    let cumulativeTime = 0;
    scheduledNotes = [];
    let resumeFrom = currentNoteIndex;

    for (let i = 0; i < parsedNotes.length; i++) {
      const note = parsedNotes[i];
      const noteStartTime = now + cumulativeTime;

      if (i >= resumeFrom) {
        const scheduled = scheduleNote(note, Math.max(now, noteStartTime));
        scheduled.noteIndex = i;
        scheduled.startTime = Math.max(now, noteStartTime);
        scheduled.duration = note.duration * (60 / bpm);
        scheduledNotes.push(scheduled);
      }
      cumulativeTime += note.duration * (60 / bpm);
    }

    scheduleUIUpdates();
  }

  function togglePlay() {
    if (isPlaying) {
      pause();
    } else if (isPaused) {
      resume();
    } else {
      play();
    }
  }

  function stopPlayback() {
    isPlaying = false;
    isPaused = false;
    scheduledNotes.forEach(s => {
      try { s.osc.stop(); } catch(e) {}
      try { s.osc2.stop(); } catch(e) {}
    });
    scheduledNotes = [];
    currentNoteIndex = 0;
    btnPlay.innerHTML = '▶ 播放';
    btnPlay.classList.add('primary');
    btnPlay.classList.remove('accent2');
    btnStop.disabled = true;
    clearHighlight();
    setStatus('ready');
  }

  // ═══════════════════════════════════════════
  // 参数更新
  // ═══════════════════════════════════════════

  window.updateBPM = function(val) {
    bpm = Math.max(20, Math.min(400, parseInt(val) || 120));
    document.getElementById('bpmInput').value = bpm;
    document.getElementById('bpmSlider').value = bpm;
    document.getElementById('bpmDisplay').textContent = bpm;
    if (isPlaying) {
      stopPlayback();
      parseEditor();
      play();
    }
  };

  window.updateVolume = function(val) {
    masterVolume = parseInt(val) / 100;
    document.getElementById('volSlider').value = val;
    document.getElementById('volDisplay').textContent = val + '%';
  };

  window.updateWaveform = function(val) {
    waveform = val;
  };

  // ═══════════════════════════════════════════
  // 示例模板
  // ═══════════════════════════════════════════

        ].join('\n');
        break;
      case 'melody':

          '2/1,1/1=G4,08,07',

          '1/1,1/1=F4,08,09',
          '1/1,1/1=E4,09,10',

        ].join('\n');

      case 'chords':
        content = [
          '// C大三和弦琶音',
          '1/2,1/1=C4,10,01',

          '1/2,1/1=G4,08,03',
          '1/2,1/1=C5,07,04',
          '1/2,1/1=G4,08,05',
          '1/2,1/1=E4,09,06',

          '1/2,1/1=A3,10,07',
          '1/2,1/1=C4,09,08',
          '1/2,1/1=E4,08,09',
          '1/2,1/1=A4,07,10',
          '1/2,1/1=E4,08,11',
          '1/2,1/1=C4,09,12',
          '// F大三和弦琶音',
          '1/2,1/1=F3,10,13',
          '1/2,1/1=A3,09,14',
          '1/2,1/1=C4,08,15',
          '1/2,1/1=F4,07,16',
          '1/2,1/1=C4,08,17',
          '1/2,1/1=A3,09,18',
          '// G7属七和弦琶音',
          '1/2,1/1=G3,10,19',
          '1/2,1/1=B3,09,20',
          '1/2,1/1=D4,08,21',
          '1/2,1/1=F4,07,22',
          '1/2,1/1=D4,08,23',
          '1/2,1/1=B3,09,24',
          '// C大三和弦柱式',
          '2/1,1/1=C4,10,25',
          '2/1,1/1=E4,09,26',
          '2/1,1/1=G4,08,27',
          '2/1,1/1=C5,07,28'
        ].join('\n');
        break;
    }
    editor.value = content;
    parseEditor();
    editor.focus();
    showToast('示例已加载');
  };

  window.clearEditor = function() {
    stopPlayback();
    editor.value = '';
    parseEditor();
    editor.focus();
  };

  // ═══════════════════════════════════════════
  // 文件导入/导出
  // ═══════════════════════════════════════════

  window.importFile = function() {
    fileInput.click();
  };

  window.handleFileImport = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      stopPlayback();
      editor.value = e.target.result;
      parseEditor();
      showToast('文件已导入: ' + file.name);
    };
    reader.readAsText(file);
    event.target.value = '';
  };

  window.exportFile = function() {
    const content = editor.value;
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'midi-score-' + new Date().toISOString().slice(0,10) + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('文件已导出');
  };

  // ═══════════════════════════════════════════
  // Toast
  // ═══════════════════════════════════════════

  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      toastTimer = null;
    }, 2000);
  }

  // ═══════════════════════════════════════════
  // 事件监听
  // ═══════════════════════════════════════════

  editor.addEventListener('input', () => {
    parseEditor();
  });

  editor.addEventListener('scroll', () => {
    gutter.scrollTop = editor.scrollTop;
    highlightOverlay.scrollTop = editor.scrollTop;
  });

  editor.addEventListener('keydown', (e) => {
    // Ctrl+S 导出
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      exportFile();
    }
    // Tab 缩进
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      parseEditor();
    }
  });

  // 全局快捷键
  document.addEventListener('keydown', (e) => {
    // 空格键播放/暂停（不在输入框中时）
    if (e.key === ' ' && document.activeElement !== editor) {
      e.preventDefault();
      togglePlay();
    }
    // Escape 停止
    if (e.key === 'Escape' && isPlaying) {
      e.preventDefault();
      stopPlayback();
    }
  });

  // 窗口大小变化时更新
  window.addEventListener('resize', () => {
    updateHighlightOverlay();
    if (isPlaying) highlightLine(currentNoteIndex);
  });

  // 关闭前清理
  window.addEventListener('beforeunload', () => {
    stopPlayback();
    if (audioCtx) audioCtx.close();
  });

  // ── 初始加载 ──
  // 尝试从 localStorage 恢复
  const saved = localStorage.getItem('midi-editor-content');
  if (saved) {
    editor.value = saved;
  } else {
    // 默认加载音阶示例
    window.loadExample('scale');
  }

  // 自动保存
  let saveTimeout;
  editor.addEventListener('input', () => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      localStorage.setItem('midi-editor-content', editor.value);
    }, 500);
  });

  // 初始解析
  parseEditor();
  updateHighlightOverlay();

  // 暴露函数到全局
  window.togglePlay = togglePlay;
  window.stopPlayback = stopPlayback;

  console.log('🎵 MIDI 文本编辑器已就绪');
  console.log('  格式: 时值,音高,大小,编号');
  console.log('  时值: 分数格式 1/1=四分音符  1/8=三十二分音符');
  console.log('  音高: 分数=音名 如 1/1=C4  4/3=F3');
  console.log('  大小: 01~10  编号: 00~99');
  console.log('  空格键播放/暂停 | Escape 停止');
})();
</script>
